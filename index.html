<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldClock</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
    <h1>
        World Clock
    </h1>
    <select>
        <option value="">Choose a city</option>
        <option value="">New York</option>
        <option value="">Saint Petersburg</option>
        <option value="">Paris</option>
    </select>

    <div class="city">
        <div>
        <h2>Saint Petersburg</h2>
        <div class="date">May 5th 2026</div>
        </div>
        <div class="time">23:40:25 <small>PM</small></div>
    </div>


    <div class="city">
        <div>
        <h2>Honolulu</h2>
        <div class="date">May 5th 2026</div>
        </div>
        <div class="time">23:40:25 <small>PM</small></div>
    </div>
    

    </div>
    <footer>This project is coded by Elena Titova and is open-sourced on <a href='https://github.com/Lena710/World-clock-project' target='_blank'>Github</a></footer>
    <script src="javascript/app.js"></script>
</body>
</html>
