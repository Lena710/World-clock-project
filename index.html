<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldClock</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://momentjs.com/downloads/moment-timezone-with-data-10-year-range.min.js"></script>
</head>
<body>
    <div class="container">
    <h1>
        World Clock
    </h1>
    <select id="cities">
        <option value="">Choose a city</option>
        <option value="currentLocation">Current location</option>
        <option value="America/New_York">New York</option>
        <option value="Europe/London">London</option>
        <option value="Europe/Paris">Paris</option>
    </select>

    <div class="cities">
    <div class="city" id="stP">
        <div>
        <h2>Saint Petersburg</h2>
        <div class="date"></div>
        </div>
        <div class="time"></div>
    </div>


    <div class="city" id="honolulu">
        <div>
        <h2>Honolulu</h2>
        <div class="date"></div>
        </div>
        <div class="time"></div>
    </div>

    </div>
    

    </div>
    <footer>This project is coded by Elena Titova and is open-sourced on <a href='https://github.com/Lena710/World-clock-project' target='_blank'>Github</a></footer>
    <script src="javascript/app.js"></script>
</body>
</html>
